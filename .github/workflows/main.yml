name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.22'
  FLUTTER_VERSION: '3.24.0'
  REGISTRY: ghcr.io

jobs:
  # Phase 1: Pre-build verification
  pre-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Constitution Inheritance Check
        run: bash tests/verify_constitution_inheritance.sh
      - name: Documentation Consistency Gate
        run: bash tests/docs_consistency_gate.sh

  # Phase 2: Lint and static analysis
  lint:
    runs-on: ubuntu-latest
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=10m ./...
      - name: Go Vet
        run: go vet ./...

  # Phase 3: Unit tests for all services
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - vault-service
          - host-service
          - ssh-proxy-service
          - terminal-service
          - sftp-service
          - port-forward-service
          - snippet-service
          - keychain-service
          - workspace-service
          - collaboration-service
          - notification-service
          - audit-service
          - analytics-service
          - ai-service
          - recording-service
          - pki-service
          - org-service
          - billing-service
          - config-service
          - health-service
          - container-bridge-service
          - helixtrack-bridge-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: cd services/${{ matrix.service }} && go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  # Phase 4: Contract tests
  contract-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run contract tests
        run: cd test/contracts && go test -v ./...

  # Phase 5: Integration tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: helixterminator
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8.0.0-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run integration tests
        run: cd test/integration && go test -v ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/helixterminator?sslmode=disable
          REDIS_URL: redis://localhost:6379

  # Phase 6: Security scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main

  # Phase 7: Build Docker images
  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - vault-service
          - host-service
          - ssh-proxy-service
          - terminal-service
          - sftp-service
          - port-forward-service
          - snippet-service
          - keychain-service
          - workspace-service
          - collaboration-service
          - notification-service
          - audit-service
          - analytics-service
          - ai-service
          - recording-service
          - pki-service
          - org-service
          - billing-service
          - config-service
          - health-service
          - container-bridge-service
          - helixtrack-bridge-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Phase 8: Flutter build
  flutter-build:
    runs-on: ubuntu-latest
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: cd clients/flutter && flutter pub get
      - run: cd clients/flutter && flutter analyze
      - run: cd clients/flutter && flutter test
      - run: cd clients/flutter && flutter build web --release
      - run: cd clients/flutter && flutter build apk --release

  # Phase 9: Terraform validation
  terraform-validate:
    runs-on: ubuntu-latest
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/
      - name: Terraform init
        run: cd infrastructure/terraform/modules/vpc && terraform init -backend=false
      - name: Terraform validate
        run: cd infrastructure/terraform/modules/vpc && terraform validate

  # Phase 10: Helm lint
  helm-lint:
    runs-on: ubuntu-latest
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: '3.15.0'
      - name: Helm lint
        run: cd infrastructure/helm/helixterm && helm lint .
      - name: Helm template
        run: cd infrastructure/helm/helixterm && helm template . > /dev/null

  # Phase 11: Performance tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 performance tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: test/performance/k6/load-test.js

  # Phase 12: Security audit (OWASP ZAP)
  zap-scan:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://api.helixterminator.io'
          rules_file_name: '.zap/rules.tsv'

  # Phase 13: Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build, flutter-build, terraform-validate, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to staging cluster"
        # kubectl apply -k infrastructure/kubernetes/overlays/staging/

  # Phase 14: Smoke tests
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: |
          curl -sf https://api.staging.helixterminator.io/healthz || exit 1
          curl -sf https://api.staging.helixterminator.io/healthz/ready || exit 1

  # Phase 15: Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [smoke-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to production cluster"
        # kubectl apply -k infrastructure/kubernetes/overlays/production/
