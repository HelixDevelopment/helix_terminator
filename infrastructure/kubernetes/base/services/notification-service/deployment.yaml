apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: helixterminator
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: helixterminator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/component: service
        app.kubernetes.io/part-of: helixterminator
    spec:
      serviceAccountName: helixterminator
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notification-service
          image: helixterminator/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helixterminator-db-secret
                  key: DATABASE_URL
            # T15/T19: JWT_PUBLIC_KEY validates the gateway-forwarded bearer
            # token on every authenticated notification route (services/notification-service/internal/server/server.go authMiddleware).
            # MUST be the public half of the SAME Ed25519 keypair provisioned
            # as auth-service's JWT_PRIVATE_KEY (see infrastructure/kubernetes/
            # base/services/auth-service/deployment.yaml +
            # docs/guides/JWT_KEY_PROVISIONING.md). Without it this service fails
            # closed (401 "JWT validation not configured") on every
            # authenticated request.
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: helix-jwt-keys
                  key: JWT_PUBLIC_KEY
