apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: helixterminator
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: helixterminator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: service
        app.kubernetes.io/part-of: helixterminator
    spec:
      serviceAccountName: helixterminator
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth-service
          image: helixterminator/auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helixterminator-db-secret
                  key: DATABASE_URL
            # T15: the Ed25519 signing key auth-service uses to mint
            # JWTs. Without this, auth-service silently generates a new
            # ephemeral keypair on every restart, so no other replica,
            # no restart, and no other service (gateway-service,
            # billing-service - see JWT_PUBLIC_KEY below) can ever
            # validate a token it issues. ENVIRONMENT=production above
            # makes auth-service refuse to start if this Secret key is
            # missing, instead of silently falling back to that broken
            # ephemeral behaviour. See
            # docs/guides/JWT_KEY_PROVISIONING.md for how the operator
            # generates the keypair and creates the helix-jwt-keys
            # Secret referenced here (placeholder name - contains NO
            # literal key material in this manifest).
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: helix-jwt-keys
                  key: JWT_PRIVATE_KEY
            # Optional consistency check: if present, auth-service
            # verifies this matches the public key derived from
            # JWT_PRIVATE_KEY and refuses to start on a mismatch (a
            # provisioning error that would otherwise silently break
            # every other service's validation).
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: helix-jwt-keys
                  key: JWT_PUBLIC_KEY
