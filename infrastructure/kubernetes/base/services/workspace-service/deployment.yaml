apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-service
  namespace: helixterminator
  labels:
    app.kubernetes.io/name: workspace-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: helixterminator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: workspace-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workspace-service
        app.kubernetes.io/component: service
        app.kubernetes.io/part-of: helixterminator
    spec:
      serviceAccountName: helixterminator
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: workspace-service
          image: helixterminator/workspace-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helixterminator-db-secret
                  key: DATABASE_URL
            # T19: JWT_PUBLIC_KEY validates the gateway-forwarded access token
            # minted by auth-service (services/workspace-service/internal/
            # server/server.go authMiddleware, which now fails CLOSED). MUST be
            # the public half of the SAME Ed25519 keypair provisioned as
            # auth-service's JWT_PRIVATE_KEY (verify-only: no JWT_PRIVATE_KEY
            # here) - otherwise every real bearer token is rejected with 401.
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: helix-jwt-keys
                  key: JWT_PUBLIC_KEY
