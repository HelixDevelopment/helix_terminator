apiVersion: v1
kind: ServiceAccount
metadata:
  name: helixterminator
  namespace: helixterminator
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/helixterminator-service-role"
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helixterminator
  namespace: helixterminator
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helixterminator
  namespace: helixterminator
subjects:
  - kind: ServiceAccount
    name: helixterminator
    namespace: helixterminator
roleRef:
  kind: Role
  name: helixterminator
  apiGroup: rbac.authorization.k8s.io
