apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@helixterminator.io
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-helixterminator-io
  namespace: helixterminator
spec:
  secretName: api-helixterminator-io-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.helixterminator.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-helixterminator-io
  namespace: helixterminator
spec:
  secretName: app-helixterminator-io-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - app.helixterminator.io
    - www.helixterminator.io
