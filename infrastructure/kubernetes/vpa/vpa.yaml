apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gateway-service
  namespace: helixterminator
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          memory: 128Mi
          cpu: 50m
        maxAllowed:
          memory: 2Gi
          cpu: 2000m
        controlledResources: ["cpu", "memory"]
---
