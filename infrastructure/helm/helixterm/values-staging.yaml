# Staging overrides for the HelixTerminator Helm chart.
# This file is intended to be used with:
#   helm upgrade --install helixterm . -f values-staging.yaml

global:
  imageRegistry: ""

gateway:
  replicaCount: 1
  image:
    tag: "1.0.0-staging"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    hosts:
      - host: api.staging.helixterminator.io
        paths:
          - path: /
            pathType: Prefix

