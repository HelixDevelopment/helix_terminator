{{- $global := . }}
{{- $serviceNames := list "gateway" "auth" "user" "vault" "host" "sshproxy" "terminal" "keychain" "workspace" "config" "pki" "billing" "org" "notification" "audit" "health" "ai" "collaboration" "containerbridge" "helixtrackbridge" "portforward" "sftp" "recording" "snippet" "analytics" }}
{{- range $serviceNames }}
{{- $serviceName := . }}
{{- $svc := index $global.Values $serviceName }}
{{- if and $svc (kindIs "map" $svc) $svc.enabled $svc.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "helixterm.serviceFullname" (dict "root" $global "serviceName" $serviceName) }}
  labels:
    {{- include "helixterm.labels" $global | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "helixterm.serviceFullname" (dict "root" $global "serviceName" $serviceName) }}
  minReplicas: {{ $svc.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas }}
  metrics:
    {{- if $svc.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $svc.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
