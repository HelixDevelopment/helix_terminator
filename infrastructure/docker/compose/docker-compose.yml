version: "3.8"

services:
  # Infrastructure
  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix}
      POSTGRES_DB: ${POSTGRES_DB:-helixterminator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helixterminator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - helix-network

  redis:
    image: redis:8.0.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - helix-network

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - helix-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - helix-network

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - helix-network

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - helix-network

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    networks:
      - helix-network

  # Core Services
  gateway-service:
    build:
      context: ../../services/gateway-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8080
      HOST_SERVICE_URL: http://host-service:8080
      # Verifies tokens signed by auth-service (see
      # docs/guides/JWT_KEY_PROVISIONING.md). Must match auth-service's
      # JWT_PRIVATE_KEY-derived public key when the latter is set.
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
    depends_on:
      - auth-service
      - user-service
      - host-service
    networks:
      - helix-network

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
      REDIS_URL: redis://redis:6379
      # JWT signing key provisioning (see docs/guides/JWT_KEY_PROVISIONING.md).
      # ENVIRONMENT defaults to "development" so a keyless local bring-up still
      # boots via the loud-warned ephemeral dev keypair instead of failing
      # closed; set ENVIRONMENT=production in your .env (with real keys below)
      # for a shared/staging compose deployment.
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - helix-network

  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  host-service:
    build:
      context: ../../services/host-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  vault-service:
    build:
      context: ../../services/vault-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  ssh-proxy-service:
    build:
      context: ../../services/ssh-proxy-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
    networks:
      - helix-network

  terminal-service:
    build:
      context: ../../services/terminal-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  workspace-service:
    build:
      context: ../../services/workspace-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  config-service:
    build:
      context: ../../services/config-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  pki-service:
    build:
      context: ../../services/pki-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  billing-service:
    build:
      context: ../../services/billing-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
      # Verifies tokens signed by auth-service (see
      # docs/guides/JWT_KEY_PROVISIONING.md). Must match auth-service's
      # JWT_PRIVATE_KEY-derived public key when the latter is set.
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  org-service:
    build:
      context: ../../services/org-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-network

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - helix-network

  audit-service:
    build:
      context: ../../services/audit-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - helix-network

  health-service:
    build:
      context: ../../services/health-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      HEALTH_ENDPOINTS: '{"gateway":"http://gateway-service:8080/healthz","auth":"http://auth-service:8080/healthz"}'
    networks:
      - helix-network

  ai-service:
    build:
      context: ../../services/ai-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
    depends_on:
