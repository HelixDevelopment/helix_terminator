        condition: service_healthy
    networks:
      - helix-network

  collaboration-service:
    build:
      context: ../../services/collaboration-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helixterminator}?sslmode=disable
