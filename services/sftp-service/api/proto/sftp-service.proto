syntax = "proto3";

package sftp_service;

option go_package = "github.com/helixdevelopment/sftp-service/api/proto;sftp_service";

// TODO: define service RPCs and messages

service SftpServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
