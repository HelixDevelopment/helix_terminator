syntax = "proto3";

package container_bridge_service.v1;

option go_package = "github.com/helixdevelopment/container-bridge-service/api/proto/container_bridge_service/v1;container_bridge_servicev1";

// TODO: define service RPCs and messages

service ContainerBridgeServiceService {
	rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
	bool healthy = 1;
}
