syntax = "proto3";

package container_bridge_service;

option go_package = "github.com/helixdevelopment/container-bridge-service/api/proto;container_bridge_service";

// TODO: define service RPCs and messages

service ContainerBridgeServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
