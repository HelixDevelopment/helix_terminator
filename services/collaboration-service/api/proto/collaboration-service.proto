syntax = "proto3";

package collaboration_service;

option go_package = "github.com/helixdevelopment/collaboration-service/api/proto;collaboration_service";

// TODO: define service RPCs and messages

service CollaborationServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
