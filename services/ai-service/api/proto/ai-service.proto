syntax = "proto3";

package ai_service;

option go_package = "github.com/helixdevelopment/ai-service/api/proto;ai_service";

// TODO: define service RPCs and messages

service AiServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
