syntax = "proto3";

package ai_service.v1;

option go_package = "github.com/helixdevelopment/ai-service/api/proto/ai_service/v1;ai_servicev1";

// TODO: define service RPCs and messages

service AiServiceService {
	rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
	bool healthy = 1;
}
