syntax = "proto3";

package analytics_service.v1;

option go_package = "github.com/helixdevelopment/analytics-service/api/proto/analytics_service/v1;analytics_servicev1";

// TODO: define service RPCs and messages

service AnalyticsServiceService {
	rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
	bool healthy = 1;
}
