syntax = "proto3";

package terminal_service;

option go_package = "github.com/helixdevelopment/terminal-service/api/proto;terminal_service";

// TODO: define service RPCs and messages

service TerminalServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
