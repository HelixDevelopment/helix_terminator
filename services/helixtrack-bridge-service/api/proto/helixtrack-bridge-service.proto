syntax = "proto3";

package helixtrack_bridge_service;

option go_package = "github.com/helixdevelopment/helixtrack-bridge-service/api/proto;helixtrack_bridge_service";

// TODO: define service RPCs and messages

service HelixtrackBridgeServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
