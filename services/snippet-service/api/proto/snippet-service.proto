syntax = "proto3";

package snippet_service;

option go_package = "github.com/helixdevelopment/snippet-service/api/proto;snippet_service";

// TODO: define service RPCs and messages

service SnippetServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
