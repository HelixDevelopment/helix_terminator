syntax = "proto3";

package port_forward_service;

option go_package = "github.com/helixdevelopment/port-forward-service/api/proto;port_forward_service";

// TODO: define service RPCs and messages

service PortForwardServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
