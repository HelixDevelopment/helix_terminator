syntax = "proto3";

package org_service;

option go_package = "github.com/helixdevelopment/org-service/api/proto;org_service";

// Protobuf definitions for org-service (future gRPC gateway)

service OrgService {
  rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
}
