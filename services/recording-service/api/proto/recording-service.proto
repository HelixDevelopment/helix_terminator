syntax = "proto3";

package recording_service;

option go_package = "github.com/helixdevelopment/recording-service/api/proto;recording_service";

// TODO: define service RPCs and messages

service RecordingServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
