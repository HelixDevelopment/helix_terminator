syntax = "proto3";

package keychain_service;

option go_package = "github.com/helixdevelopment/keychain-service/api/proto;keychain_service";

// TODO: define service RPCs and messages

service KeychainServiceService {
	rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
	bool healthy = 1;
}
