# ============================================================================
# reporting.yaml — CONSUMER-OWNED config for helix_terminator's §11.4.202
# reporting directives (ISSUE: / BUG: / TASK: / FEATURE:) and the shared
# §11.4.93/§11.4.95 workable-items single-source-of-truth.
#
# This file is DATA for the constitution-shipped engine
# (constitution/scripts/reporting/report_item.sh), consumed BY REFERENCE
# (§11.4.28/§11.4.177) — the engine is NEVER copied or reimplemented here.
# Template: constitution/scripts/reporting/reporting.example.yaml.
#
# Search order the engine uses (constitution/scripts/reporting/report_item.sh
# lines ~197-212): $HELIX_REPORTING_CONFIG env var, then THIS file
# (<project-root>/.helix/reporting.yaml), then
# <project-root>/config/reporting/reporting.yaml.
# ============================================================================

schema_version: 1

# ── The workable-items SQLite single-source-of-truth (§11.4.93 / §11.4.95) ──
# TRACKED in git (never gitignored — §11.4.95: the DB IS authoritative source
# data, not a build artifact). Its `.db-wal`/`.db-shm` sidecars ARE gitignored
# (WAL-checkpoint before every commit-stage per §11.4.95; see .gitignore).
db: docs/workable_items.db

# ── Ticket-id prefix (§11.4.54 / §11.4.151) ─────────────────────────────────
# EXPLICITLY PINNED (not left to runtime auto-derivation) so the prefix can
# never silently drift if the project directory is ever renamed/relocated or
# the binary's derivation algorithm changes — §11.4.6 no-guessing: an
# implicit re-derivation on every invocation is a smaller-but-real bluff
# surface next to one explicit, version-controlled, auditable value.
#
# Evidence for "HEL":
#   1. §11.4.151 resolution order checked in this project, in order:
#        (a) $HELIX_RELEASE_PREFIX env var        — unset in this session.
#        (b) HELIX_RELEASE_PREFIX in a `.env` file — this project has NO
#            `.env` file at all (only `constitution/.env.example` carries a
#            COMMENTED example `# HELIX_RELEASE_PREFIX=helix_constitution`,
#            which documents the CONSTITUTION SUBMODULE's own prefix, not
#            this project's — not applicable here).
#        (c) lowercased snake_case of the project-root directory name
#            (§11.4.29) — this project's root dir is `helix_terminator`,
#            already lowercase snake_case.
#   2. No pre-existing ticket-tracker prefix convention was found in this
#      project's history. The only look-alike hit, `HT-SSHCA-20260714`
#      (`.superpowers/sdd/progress.md`, S-PKI-PLAN entry), is a §11.4.83 QA
#      run-id DIRECTORY NAME (`docs/qa/<run-id>/`), not a workable-item
#      ticket-tracker prefix — a different ID namespace entirely. No
#      docs/Issues.md / Fixed.md tracker has ever existed in this project
#      (confirmed absent) to have minted any prefix.
#   3. The workable-items binary's own §11.4.151 derivation
#      (`defaultKeyPrefix()` -> `deriveKeyPrefix(snakeCase(projectRootName()))`
#      in constitution/scripts/workable-items/cmd/workable-items/prefix.go)
#      run LIVE from this project's root (probe deleted, not committed —
#      evidence captured in the session report) derived exactly "HEL" from
#      "helix_terminator" (first 3 ASCII letters, uppercased: h-e-l).
id_prefix: HEL

# ── Default severity when the caller passes no --severity.
default_severity: Medium

# ── Default `created_by` attribution (§11.4.104) when no --reported-by given.
default_reported_by: Operator

# ── The FULL doc-sync command (§11.4.106 / §11.4.12 / §11.4.53 / §11.4.65).
#
# LEFT EMPTY — NOT YET WIRED. See docs/guides/WORKABLE_ITEMS.md
# "What is NOT yet wired" for the full honest-gap rationale. Summary: this
# project has never had a docs/Issues.md / docs/Fixed.md tracker, nor the
# HTML/PDF/DOCX export pipeline (§11.4.65/§11.4.106 docs_chain) those
# trackers require to be FULLY §11.4.202(3)(b)-compliant. The
# `workable-items` binary DOES ship a `sync db-to-md` subcommand that alone
# could regenerate Issues.md/Fixed.md from the DB, but wiring ONLY that here
# would (a) create the FIRST-EVER Issues.md/Fixed.md for this project as a
# side effect of a narrowly-scoped consumer-wiring pass — a bigger decision
# than this task's scope — and (b) still leave the HTML/PDF/DOCX siblings
# unregenerated, i.e. a PARTIAL sync silently presented as complete. Empty
# `sync_command` makes the engine report an HONEST SKIP-with-reason
# (§11.4.3/§11.4.6) instead of a bluffed/partial PASS. Wiring the full
# doc-regen pipeline is tracked as follow-up work (see the guide).
sync_command: ""

# ── Where captured evidence is written (§11.4.5 / §11.4.69).
evidence_dir: qa-results/reporting

# ── External trackers (§11.4.148 D5) ─────────────────────────────────────────
# NONE configured. No tracker credentials exist anywhere in this project's
# environment/.env (this project has no .env at all) and no external
# tracker client is wired. Leaving this list empty is itself honest per
# §11.4.202(4): with zero entries the engine's tracker loop never runs
# (TRACKER_COUNT=0), so no push is ever attempted, faked, or silently
# dropped — there is simply nothing configured to push to. The moment a
# tracker (e.g. GitHub Issues, HelixTrack) is provisioned with real
# credentials, add its entry here per reporting.example.yaml's documented
# schema (name / command / required_env / env_passthrough); the honest-skip
# mechanism (`tracker_client_absent` / `credentials_absent`) was verified
# live in this session (see docs/guides/WORKABLE_ITEMS.md "End-to-end proof").
trackers: []
