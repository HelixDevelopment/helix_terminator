run:
  timeout: 5m
  skip-dirs:
    - vendor

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - gocritic
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/helixdevelopment

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
