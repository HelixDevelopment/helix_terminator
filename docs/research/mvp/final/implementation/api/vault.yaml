  get:
    /api/v1/vaults/{vaultId}/items/{itemId}:
      summary: Get item
      operationId: /api/v1/vaults/{vaultId}/items/{itemId}get
      tags:
        - vault
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
