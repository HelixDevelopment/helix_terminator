syntax = "proto3";
package helixterm.v1;
option go_package = "helixterminator.io/core/internal/proto;proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// NotificationService provides multi-channel notification delivery.
service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc SendDigest(SendDigestRequest) returns (SendDigestResponse);
  rpc SendWebhook(SendWebhookRequest) returns (SendWebhookResponse);
  rpc GetNotificationStatus(GetNotificationStatusRequest) returns (NotificationStatus);
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (google.protobuf.Empty);
}

message SendNotificationRequest {
  string org_id = 1;
  string user_id = 2;
  string type = 3; // "email", "push", "in_app", "slack", "webhook"
  string subject = 4;
  string body = 5;
  string template_id = 6;
  string priority = 7; // "low", "normal", "high", "urgent"
  map<string, string> variables = 8;
}

message SendNotificationResponse {
  string notification_id = 1;
  string status = 2;
  google.protobuf.Timestamp sent_at = 3;
}

message SendDigestRequest {
  string org_id = 1;
  string user_id = 2;
  string digest_type = 3; // "daily", "weekly"
  repeated string notification_ids = 4;
}

message SendDigestResponse {
  string digest_id = 1;
  string status = 2;
}

message SendWebhookRequest {
  string org_id = 1;
  string webhook_url = 2;
  string event_type = 3;
  bytes payload = 4;
  map<string, string> headers = 5;
}

message SendWebhookResponse {
  int32 status_code = 1;
  string response_body = 2;
  bool success = 3;
}

message GetNotificationStatusRequest {
  string notification_id = 1;
}

message NotificationStatus {
  string notification_id = 1;
  string status = 2; // "pending", "sent", "delivered", "failed", "bounced"
  google.protobuf.Timestamp sent_at = 3;
  google.protobuf.Timestamp delivered_at = 4;
  string error_message = 5;
}

message UpdateNotificationPreferencesRequest {
  string user_id = 1;
  string org_id = 2;
  string channel = 3;
  bool enabled = 4;
  string quiet_hours_start = 5;
  string quiet_hours_end = 6;
}
