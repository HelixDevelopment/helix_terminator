syntax = "proto3";

package helixterm.helixtrack_bridge.v1;

option go_package = "github.com/HelixDevelopment/helix-terminator/proto/helixterm/helixtrack_bridge/v1;helixtrackbridgev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "helixterm/common/v1/common.proto";

service HelixTrackBridgeService {
  rpc GetTrack(GetTrackRequest) returns (Track);
  rpc ListTracks(ListTracksRequest) returns (ListTracksResponse);
  rpc CreateTrack(CreateTrackRequest) returns (Track);
  rpc UpdateTrack(UpdateTrackRequest) returns (Track);
  rpc DeleteTrack(DeleteTrackRequest) returns (google.protobuf.Empty);
  rpc GetTrackMetrics(GetTrackRequest) returns (TrackMetrics);
  rpc GetTrackHistory(GetTrackRequest) returns (TrackHistory);
  rpc GetTrackStatus(GetTrackRequest) returns (TrackStatus);
  rpc StartTrack(StartTrackRequest) returns (Track);
  rpc StopTrack(StopTrackRequest) returns (Track);
  rpc PauseTrack(PauseTrackRequest) returns (Track);
  rpc ResumeTrack(ResumeTrackRequest) returns (Track);
  rpc GetTrackEvents(GetTrackRequest) returns (TrackEvents);
  rpc StreamTrackEvents(StreamTrackEventsRequest) returns (stream TrackEvent);
  rpc GetTrackAlerts(GetTrackRequest) returns (TrackAlerts);
  rpc CreateTrackAlert(CreateTrackAlertRequest) returns (TrackAlert);
  rpc UpdateTrackAlert(UpdateTrackAlertRequest) returns (TrackAlert);
  rpc DeleteTrackAlert(DeleteTrackAlertRequest) returns (google.protobuf.Empty);
  rpc GetTrackIntegrations(GetTrackRequest) returns (TrackIntegrations);
  rpc AddTrackIntegration(AddTrackIntegrationRequest) returns (TrackIntegration);
  rpc RemoveTrackIntegration(RemoveTrackIntegrationRequest) returns (google.protobuf.Empty);
  rpc GetTrackReports(GetTrackReportsRequest) returns (TrackReports);
  rpc GenerateTrackReport(GenerateTrackReportRequest) returns (TrackReport);
  rpc GetTrackAuditLog(GetTrackRequest) returns (common.v1.AuditLogStream);
  rpc GetTrackPermissions(GetTrackRequest) returns (TrackPermissions);
  rpc UpdateTrackPermissions(UpdateTrackPermissionsRequest) returns (TrackPermissions);
  rpc ExportTrackData(ExportTrackDataRequest) returns (ExportTrackDataResponse);
  rpc ImportTrackData(ImportTrackDataRequest) returns (Track);
  rpc GetTrackTemplates(google.protobuf.Empty) returns (TrackTemplates);
  rpc ApplyTrackTemplate(ApplyTrackTemplateRequest) returns (Track);
  rpc GetTrackDependencies(GetTrackRequest) returns (TrackDependencies);
  rpc GetTrackComparison(GetTrackComparisonRequest) returns (TrackComparison);
  rpc GetTrackBenchmarks(GetTrackRequest) returns (TrackBenchmarks);
  rpc SetTrackBenchmark(SetTrackBenchmarkRequest) returns (TrackBenchmark);
}

message Track {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string status = 5;
  string organization_id = 6;
  string owner_id = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp ended_at = 11;
  map<string, string> metadata = 12;
}

message TrackMetrics {
  string track_id = 1;
  int64 total_events = 2;
  int64 total_alerts = 3;
  float average_latency_ms = 4;
  float throughput_per_second = 5;
  int64 error_count = 6;
  float success_rate = 7;
  google.protobuf.Timestamp collected_at = 8;
}

message TrackHistory {
  string track_id = 1;
  repeated TrackHistoryEntry entries = 2;
}

message TrackHistoryEntry {
  string action = 1;
  string actor_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> details = 4;
}

message TrackStatus {
  string track_id = 1;
  string status = 2;
  string current_phase = 3;
  float progress_percent = 4;
  string last_message = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message TrackEvent {
  string id = 1;
  string track_id = 2;
  string type = 3;
  string severity = 4;
  string message = 5;
  map<string, string> payload = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message TrackEvents {
  string track_id = 1;
  repeated TrackEvent events = 2;
}

message TrackAlert {
  string id = 1;
  string track_id = 2;
  string name = 3;
  string condition = 4;
  string severity = 5;
  repeated string notification_channels = 6;
  bool enabled = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message TrackAlerts {
  string track_id = 1;
  repeated TrackAlert alerts = 2;
}

message TrackIntegration {
  string id = 1;
  string track_id = 2;
  string type = 3;
  string name = 4;
  string config = 5;
  bool enabled = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message TrackIntegrations {
  string track_id = 1;
  repeated TrackIntegration integrations = 2;
}

message TrackReport {
  string id = 1;
  string track_id = 2;
  string type = 3;
  google.protobuf.Timestamp start_date = 4;
  google.protobuf.Timestamp end_date = 5;
  bytes content = 6;
  string format = 7;
  google.protobuf.Timestamp generated_at = 8;
}

message TrackReports {
  string track_id = 1;
  repeated TrackReport reports = 2;
}

message TrackPermissions {
  string track_id = 1;
  repeated TrackPermission permissions = 2;
}

message TrackPermission {
  string user_id = 1;
  string role = 2;
  repeated string actions = 3;
}

message TrackTemplate {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  map<string, string> default_config = 5;
  map<string, string> metadata = 6;
}

message TrackTemplates {
  repeated TrackTemplate templates = 1;
}

message TrackDependencies {
  string track_id = 1;
  repeated string upstream_tracks = 2;
  repeated string downstream_tracks = 3;
  repeated string services = 4;
}

message TrackComparison {
  string track_id = 1;
  string compare_track_id = 2;
  map<string, float> metric_differences = 3;
  float overall_score = 4;
  string winner = 5;
}

message TrackBenchmark {
  string id = 1;
  string track_id = 2;
  string metric = 3;
  float target_value = 4;
  float current_value = 5;
  string status = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message TrackBenchmarks {
  string track_id = 1;
  repeated TrackBenchmark benchmarks = 2;
}


message GetTrackRequest {
  string id = 1;
}

message ListTracksRequest {
  string organization_id = 1;
  string owner_id = 2;
  string type = 3;
  string status = 4;
  int32 page_size = 5;
  string page_token = 6;
  string sort_by = 7;
}

message ListTracksResponse {
  repeated Track tracks = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message CreateTrackRequest {
  string name = 1;
  string description = 2;
  string type = 3;
  string organization_id = 4;
  string owner_id = 5;
  map<string, string> metadata = 6;
}

message UpdateTrackRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string status = 4;
  map<string, string> metadata = 5;
}

message DeleteTrackRequest {
  string id = 1;
  bool force = 2;
}

message StartTrackRequest {
  string id = 1;
  map<string, string> parameters = 2;
}

message StopTrackRequest {
  string id = 1;
  string reason = 2;
}

message PauseTrackRequest {
  string id = 1;
  string reason = 2;
}

message ResumeTrackRequest {
  string id = 1;
}

message StreamTrackEventsRequest {
  string track_id = 1;
  repeated string event_types = 2;
  string severity = 3;
}

message CreateTrackAlertRequest {
  string track_id = 1;
  string name = 2;
  string condition = 3;
  string severity = 4;
  repeated string notification_channels = 5;
  bool enabled = 6;
}

message UpdateTrackAlertRequest {
  string id = 1;
  string track_id = 2;
  string name = 3;
  string condition = 4;
  string severity = 5;
  repeated string notification_channels = 6;
  bool enabled = 7;
}

message DeleteTrackAlertRequest {
  string id = 1;
  string track_id = 2;
}

message AddTrackIntegrationRequest {
  string track_id = 1;
  string type = 2;
  string name = 3;
  string config = 4;
  bool enabled = 5;
}

message RemoveTrackIntegrationRequest {
  string id = 1;
  string track_id = 2;
}

message GetTrackReportsRequest {
  string track_id = 1;
  string type = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GenerateTrackReportRequest {
  string track_id = 1;
  string type = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  string format = 5;
}

message UpdateTrackPermissionsRequest {
  string track_id = 1;
  repeated TrackPermission permissions = 2;
  bool replace = 3;
}

message ExportTrackDataRequest {
  string id = 1;
  string format = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message ExportTrackDataResponse {
  bytes data = 1;
  string format = 2;
}

message ImportTrackDataRequest {
  bytes data = 1;
  string format = 2;
  string organization_id = 3;
  string owner_id = 4;
}

message ApplyTrackTemplateRequest {
  string template_id = 1;
  string name = 2;
  string organization_id = 3;
  string owner_id = 4;
  map<string, string> overrides = 5;
}

message GetTrackComparisonRequest {
  string track_id = 1;
  string compare_track_id = 2;
  repeated string metrics = 3;
}

message SetTrackBenchmarkRequest {
  string track_id = 1;
  string metric = 2;
  float target_value = 3;
}
