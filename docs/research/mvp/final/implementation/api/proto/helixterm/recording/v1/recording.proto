syntax = "proto3";

package helixterm.recording.v1;

option go_package = "github.com/HelixDevelopment/helix-terminator/proto/helixterm/recording/v1;recordingv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "helixterm/common/v1/common.proto";

service RecordingService {
  rpc StartRecording(StartRecordingRequest) returns (Recording);
  rpc StopRecording(StopRecordingRequest) returns (Recording);
  rpc GetRecording(GetRecordingRequest) returns (Recording);
  rpc ListRecordings(ListRecordingsRequest) returns (ListRecordingsResponse);
  rpc DeleteRecording(DeleteRecordingRequest) returns (google.protobuf.Empty);
  rpc ExportRecording(ExportRecordingRequest) returns (ExportRecordingResponse);
  rpc GetRecordingStream(GetRecordingRequest) returns (stream RecordingChunk);
  rpc GetRecordingTranscript(GetRecordingRequest) returns (RecordingTranscript);
  rpc GetRecordingMetadata(GetRecordingRequest) returns (RecordingMetadata);
  rpc UpdateRecordingMetadata(UpdateRecordingMetadataRequest) returns (RecordingMetadata);
  rpc SearchRecordings(SearchRecordingsRequest) returns (ListRecordingsResponse);
  rpc GetRecordingStats(GetRecordingStatsRequest) returns (RecordingStats);
  rpc ArchiveRecording(ArchiveRecordingRequest) returns (Recording);
  rpc RestoreRecording(RestoreRecordingRequest) returns (Recording);
  rpc GetRecordingPermissions(GetRecordingRequest) returns (RecordingPermissions);
  rpc UpdateRecordingPermissions(UpdateRecordingPermissionsRequest) returns (RecordingPermissions);
  rpc ShareRecording(ShareRecordingRequest) returns (RecordingShare);
  rpc RevokeRecordingShare(RevokeRecordingShareRequest) returns (google.protobuf.Empty);
  rpc GetRecordingThumbnails(GetRecordingRequest) returns (RecordingThumbnails);
  rpc TrimRecording(TrimRecordingRequest) returns (Recording);
  rpc MergeRecordings(MergeRecordingsRequest) returns (Recording);
  rpc SplitRecording(SplitRecordingRequest) returns (SplitRecordingResponse);
  rpc AddRecordingTag(AddRecordingTagRequest) returns (RecordingTags);
  rpc RemoveRecordingTag(RemoveRecordingTagRequest) returns (RecordingTags);
  rpc GetRecordingTags(GetRecordingRequest) returns (RecordingTags);
  rpc BulkDeleteRecordings(BulkDeleteRecordingsRequest) returns (BulkDeleteRecordingsResponse);
  rpc GetRecordingAuditLog(GetRecordingRequest) returns (common.v1.AuditLogStream);
  rpc ConvertRecordingFormat(ConvertRecordingFormatRequest) returns (Recording);
  rpc GetRecordingPlaybackToken(GetRecordingRequest) returns (PlaybackToken);
}

message Recording {
  string id = 1;
  string session_id = 2;
  string user_id = 3;
  string host_id = 4;
  string workspace_id = 5;
  string organization_id = 6;
  string status = 7;
  string format = 8;
  int64 duration_seconds = 9;
  int64 file_size = 10;
  string resolution = 11;
  float frame_rate = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp ended_at = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  bool is_archived = 17;
  map<string, string> metadata = 18;
}

message RecordingChunk {
  string recording_id = 1;
  int64 sequence_number = 2;
  bytes data = 3;
  bool is_last = 4;
}

message RecordingTranscript {
  string recording_id = 1;
  repeated TranscriptSegment segments = 2;
  string full_text = 3;
  string language = 4;
}

message TranscriptSegment {
  int64 start_time_ms = 1;
  int64 end_time_ms = 2;
  string text = 3;
  float confidence = 4;
  string speaker = 5;
}

message RecordingMetadata {
  string recording_id = 1;
  string title = 2;
  string description = 3;
  repeated string tags = 4;
  map<string, string> custom_fields = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message RecordingStats {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_recordings = 4;
  int64 total_duration_seconds = 5;
  int64 total_storage_bytes = 6;
  float average_duration_seconds = 7;
  map<string, int64> recordings_by_format = 8;
  map<string, int64> recordings_by_status = 9;
}

message RecordingPermissions {
  string recording_id = 1;
  repeated RecordingPermission permissions = 2;
}

message RecordingPermission {
  string user_id = 1;
  string role = 2;
  repeated string actions = 3;
}

message RecordingShare {
  string recording_id = 1;
  string share_url = 2;
  string access_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  repeated string permissions = 5;
}

message RecordingThumbnails {
  string recording_id = 1;
  repeated Thumbnail thumbnails = 2;
}

message Thumbnail {
  int64 timestamp_ms = 1;
  string url = 2;
  int32 width = 3;
  int32 height = 4;
}

message RecordingTags {
  string recording_id = 1;
  repeated string tags = 2;
}

message PlaybackToken {
  string recording_id = 1;
  string token = 2;
  google.protobuf.Timestamp expires_at = 3;
  repeated string permissions = 4;
}



message StartRecordingRequest {
  string session_id = 1;
  string user_id = 2;
  string format = 3;
  string resolution = 4;
  float frame_rate = 5;
  map<string, string> metadata = 6;
}

message StopRecordingRequest {
  string id = 1;
  string reason = 2;
}

message GetRecordingRequest {
  string id = 1;
}

message ListRecordingsRequest {
  string organization_id = 1;
  string workspace_id = 2;
  string user_id = 3;
  string session_id = 4;
  string status = 5;
  bool include_archived = 6;
  int32 page_size = 7;
  string page_token = 8;
  string sort_by = 9;
}

message ListRecordingsResponse {
  repeated Recording recordings = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message DeleteRecordingRequest {
  string id = 1;
  bool force = 2;
}

message ExportRecordingRequest {
  string id = 1;
  string format = 2;
  string quality = 3;
  bool include_transcript = 4;
}

message ExportRecordingResponse {
  bytes data = 1;
  string format = 2;
  int64 file_size = 3;
}

message UpdateRecordingMetadataRequest {
  string recording_id = 1;
  string title = 2;
  string description = 3;
  repeated string tags = 4;
  map<string, string> custom_fields = 5;
}

message SearchRecordingsRequest {
  string organization_id = 1;
  string query = 2;
  repeated string tags = 3;
  google.protobuf.Timestamp start_date = 4;
  google.protobuf.Timestamp end_date = 5;
  int32 page_size = 6;
  string page_token = 7;
}

message ArchiveRecordingRequest {
  string id = 1;
  string archive_location = 2;
}

message RestoreRecordingRequest {
  string id = 1;
}

message UpdateRecordingPermissionsRequest {
  string recording_id = 1;
  repeated RecordingPermission permissions = 2;
  bool replace = 3;
}

message ShareRecordingRequest {
  string id = 1;
  repeated string permissions = 2;
  google.protobuf.Timestamp expires_at = 3;
  bool generate_token = 4;
}

message RevokeRecordingShareRequest {
  string id = 1;
  string share_token = 2;
}

message TrimRecordingRequest {
  string id = 1;
  int64 start_time_ms = 2;
  int64 end_time_ms = 3;
}

message MergeRecordingsRequest {
  repeated string ids = 1;
  string title = 2;
  string format = 3;
}

message SplitRecordingRequest {
  string id = 1;
  repeated int64 split_points_ms = 2;
}

message SplitRecordingResponse {
  repeated Recording recordings = 1;
}

message AddRecordingTagRequest {
  string recording_id = 1;
  string tag = 2;
}

message RemoveRecordingTagRequest {
  string recording_id = 1;
  string tag = 2;
}

message BulkDeleteRecordingsRequest {
  repeated string ids = 1;
  bool force = 2;
}

message BulkDeleteRecordingsResponse {
  repeated string deleted = 1;
  repeated string failed = 2;
  int32 total = 3;
}

message ConvertRecordingFormatRequest {
  string id = 1;
  string target_format = 2;
  string quality = 3;
}

message GetRecordingStatsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}
