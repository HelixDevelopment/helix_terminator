syntax = "proto3";
package helixterm.auth.v1;
option go_package = "github.com/HelixDevelopment/helix-terminator/proto/helixterm/auth/v1;authv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// AuthService provides internal authentication operations called by other microservices.
service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateApiKey(ValidateApiKeyRequest) returns (ValidateApiKeyResponse);
  rpc GetUserContext(GetUserContextRequest) returns (UserContext);
  rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty);
  rpc GetSession(GetSessionRequest) returns (Session);
  rpc InvalidateSession(InvalidateSessionRequest) returns (google.protobuf.Empty);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc BulkCheckPermission(BulkCheckPermissionRequest) returns (BulkCheckPermissionResponse);
}

message ValidateTokenRequest {
  string token = 1;
  repeated string required_scopes = 2;
  string audience = 3;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string session_id = 3;
  string org_id = 4;
  repeated string scopes = 5;
  bool mfa_verified = 6;
  google.protobuf.Timestamp expires_at = 7;
  string error_code = 8;
  string error_message = 9;
}

message ValidateApiKeyRequest {
  string api_key = 1;
  repeated string required_scopes = 2;
}

message ValidateApiKeyResponse {
  bool valid = 1;
  string user_id = 2;
  string key_id = 3;
  string org_id = 4;
  repeated string scopes = 5;
  repeated string allowed_ips = 6;
  string error_code = 7;
}

message GetUserContextRequest {
  string user_id = 1;
}

message UserContext {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  string org_id = 4;
  string org_slug = 5;
  string org_role = 6;
  repeated string team_ids = 7;
  repeated string permissions = 8;
  bool mfa_enabled = 9;
  string locale = 10;
  string timezone = 11;
  string status = 12;
}

message RevokeTokenRequest {
  string token_jti = 1;
  google.protobuf.Timestamp expires_at = 2;
  string reason = 3;
}

message GetSessionRequest {
  string session_id = 1;
}

message Session {
  string id = 1;
  string user_id = 2;
  string device_id = 3;
  string ip_address = 4;
  string user_agent = 5;
  bool mfa_verified = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp last_active_at = 8;
  google.protobuf.Timestamp expires_at = 9;
  string status = 10;
}

message InvalidateSessionRequest {
  string session_id = 1;
  string reason = 2;
}

message CheckPermissionRequest {
  string user_id = 1;
  string resource_type = 2;
  string resource_id = 3;
  string action = 4;
  string org_id = 5;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;
}

message BulkCheckPermissionRequest {
  repeated CheckPermissionRequest checks = 1;
}

message BulkCheckPermissionResponse {
  repeated CheckPermissionResponse results = 1;
}
