syntax = "proto3";

package helixterm.analytics.v1;

option go_package = "github.com/HelixDevelopment/helix-terminator/proto/helixterm/analytics/v1;analyticsv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service AnalyticsService {
  rpc GetDashboardMetrics(GetDashboardMetricsRequest) returns (DashboardMetrics);
  rpc GetUserAnalytics(GetUserAnalyticsRequest) returns (UserAnalytics);
  rpc GetOrganizationAnalytics(GetOrganizationAnalyticsRequest) returns (OrganizationAnalytics);
  rpc GetSessionAnalytics(GetSessionAnalyticsRequest) returns (SessionAnalytics);
  rpc GetHostAnalytics(GetHostAnalyticsRequest) returns (HostAnalytics);
  rpc GetWorkspaceAnalytics(GetWorkspaceAnalyticsRequest) returns (WorkspaceAnalytics);
  rpc GetTerminalUsageAnalytics(GetTerminalUsageAnalyticsRequest) returns (TerminalUsageAnalytics);
  rpc GetCollaborationAnalytics(GetCollaborationAnalyticsRequest) returns (CollaborationAnalytics);
  rpc GetSecurityAnalytics(GetSecurityAnalyticsRequest) returns (SecurityAnalytics);
  rpc GetPerformanceAnalytics(GetPerformanceAnalyticsRequest) returns (PerformanceAnalytics);
  rpc GetRetentionAnalytics(GetRetentionAnalyticsRequest) returns (RetentionAnalytics);
  rpc GetCustomReport(GetCustomReportRequest) returns (CustomReport);
  rpc CreateCustomReport(CreateCustomReportRequest) returns (CustomReport);
  rpc UpdateCustomReport(UpdateCustomReportRequest) returns (CustomReport);
  rpc DeleteCustomReport(DeleteCustomReportRequest) returns (google.protobuf.Empty);
  rpc ListCustomReports(ListCustomReportsRequest) returns (ListCustomReportsResponse);
  rpc ExportReport(ExportReportRequest) returns (ExportReportResponse);
  rpc ScheduleReport(ScheduleReportRequest) returns (ScheduledReport);
  rpc GetScheduledReports(GetScheduledReportsRequest) returns (ScheduledReports);
  rpc CancelScheduledReport(CancelScheduledReportRequest) returns (google.protobuf.Empty);
  rpc GetRealTimeMetrics(GetRealTimeMetricsRequest) returns (RealTimeMetrics);
  rpc StreamRealTimeMetrics(StreamRealTimeMetricsRequest) returns (stream RealTimeMetrics);
  rpc GetAnomalyDetectionResults(GetAnomalyDetectionResultsRequest) returns (AnomalyDetectionResults);
  rpc GetPredictiveAnalytics(GetPredictiveAnalyticsRequest) returns (PredictiveAnalytics);
  rpc GetFunnelAnalysis(GetFunnelAnalysisRequest) returns (FunnelAnalysis);
  rpc GetCohortAnalysis(GetCohortAnalysisRequest) returns (CohortAnalysis);
  rpc GetBenchmarkComparison(GetBenchmarkComparisonRequest) returns (BenchmarkComparison);
}

message DashboardMetrics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_sessions = 4;
  int64 active_users = 5;
  int64 total_commands = 6;
  float average_session_duration = 7;
  map<string, float> key_metrics = 8;
  repeated MetricChart charts = 9;
}

message MetricChart {
  string id = 1;
  string title = 2;
  string type = 3;
  repeated ChartDataPoint data = 4;
}

message ChartDataPoint {
  string label = 1;
  float value = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message UserAnalytics {
  string user_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_sessions = 4;
  int64 total_commands = 5;
  float average_session_duration = 6;
  int64 total_hosts_accessed = 7;
  int64 total_files_transferred = 8;
  map<string, int64> command_distribution = 9;
  repeated ActivityTimelineEntry activity_timeline = 10;
}

message ActivityTimelineEntry {
  google.protobuf.Timestamp timestamp = 1;
  string action = 2;
  string resource_type = 3;
  int32 count = 4;
}

message OrganizationAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_users = 4;
  int64 active_users = 5;
  int64 total_sessions = 6;
  int64 total_hosts = 7;
  int64 total_workspaces = 8;
  float user_growth_rate = 9;
  float session_growth_rate = 10;
  map<string, float> plan_distribution = 11;
}

message SessionAnalytics {
  string session_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_commands = 4;
  float duration_seconds = 5;
  int64 bytes_sent = 6;
  int64 bytes_received = 7;
  map<string, int64> command_frequency = 8;
  repeated string errors = 9;
}

message HostAnalytics {
  string host_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_sessions = 4;
  int64 total_commands = 5;
  float average_latency = 6;
  float uptime_percent = 7;
  map<string, float> resource_usage = 8;
}

message WorkspaceAnalytics {
  string workspace_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_sessions = 4;
  int64 active_members = 5;
  int64 total_files = 6;
  float collaboration_score = 7;
  map<string, int64> activity_by_member = 8;
}

message TerminalUsageAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_terminal_sessions = 4;
  int64 total_commands_executed = 5;
  map<string, int64> shell_distribution = 6;
  map<string, int64> os_distribution = 7;
  float average_terminal_session_duration = 8;
}

message CollaborationAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_collaboration_sessions = 4;
  int64 total_participants = 5;
  float average_participants_per_session = 6;
  int64 total_messages = 7;
  map<string, int64> collaboration_modes = 8;
}

message SecurityAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int64 total_security_events = 4;
  int64 failed_login_attempts = 5;
  int64 mfa_challenges = 6;
  int64 policy_violations = 7;
  map<string, int64> events_by_severity = 8;
  map<string, int64> events_by_type = 9;
}

message PerformanceAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  float average_api_latency = 4;
  float p99_api_latency = 5;
  float average_session_startup_time = 6;
  float average_file_transfer_speed = 7;
  map<string, float> service_latency_percentiles = 8;
}

message RetentionAnalytics {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  float daily_retention = 4;
  float weekly_retention = 5;
  float monthly_retention = 6;
  float quarterly_retention = 7;
  map<string, float> cohort_retention = 8;
}

message CustomReport {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string query = 5;
  string organization_id = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  map<string, string> parameters = 10;
}

message ScheduledReport {
  string id = 1;
  string report_id = 2;
  string frequency = 3;
  string recipients = 4;
  string format = 5;
  google.protobuf.Timestamp next_run_at = 6;
  google.protobuf.Timestamp last_run_at = 7;
  bool enabled = 8;
}

message ScheduledReports {
  repeated ScheduledReport reports = 1;
}

message RealTimeMetrics {
  string organization_id = 1;
  int64 active_sessions = 2;
  int64 active_users = 3;
  float system_cpu_percent = 4;
  float system_memory_percent = 5;
  int64 requests_per_second = 6;
  float average_response_time_ms = 7;
  map<string, int64> active_connections_by_service = 8;
}

message AnomalyDetectionResults {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  repeated Anomaly anomalies = 4;
}

message Anomaly {
  string id = 1;
  string metric = 2;
  float expected_value = 3;
  float actual_value = 4;
  float deviation_percent = 5;
  string severity = 6;
  google.protobuf.Timestamp detected_at = 7;
}

message PredictiveAnalytics {
  string organization_id = 1;
  string metric = 2;
  google.protobuf.Timestamp forecast_start = 3;
  google.protobuf.Timestamp forecast_end = 4;
  repeated ForecastDataPoint forecast = 5;
  float confidence_interval = 6;
}

message ForecastDataPoint {
  google.protobuf.Timestamp timestamp = 1;
  float predicted_value = 2;
  float lower_bound = 3;
  float upper_bound = 4;
}

message FunnelAnalysis {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  repeated FunnelStep steps = 4;
  float overall_conversion_rate = 5;
}

message FunnelStep {
  string name = 1;
  int64 users = 2;
  float conversion_rate = 3;
  float drop_off_rate = 4;
}

message CohortAnalysis {
  string organization_id = 1;
  string cohort_type = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  repeated Cohort cohorts = 5;
}

message Cohort {
  string label = 1;
  int64 initial_size = 2;
  map<string, float> retention_by_period = 3;
}

message BenchmarkComparison {
  string organization_id = 1;
  string metric = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  float organization_value = 5;
  float industry_average = 6;
  float percentile_rank = 7;
  map<string, float> peer_comparison = 8;
}

message GetDashboardMetricsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetUserAnalyticsRequest {
  string user_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetOrganizationAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetSessionAnalyticsRequest {
  string session_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetHostAnalyticsRequest {
  string host_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetWorkspaceAnalyticsRequest {
  string workspace_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetTerminalUsageAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetCollaborationAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetSecurityAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetPerformanceAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetRetentionAnalyticsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetCustomReportRequest {
  string id = 1;
}

message CreateCustomReportRequest {
  string name = 1;
  string description = 2;
  string type = 3;
  string query = 4;
  string organization_id = 5;
  map<string, string> parameters = 6;
}

message UpdateCustomReportRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string query = 5;
  map<string, string> parameters = 6;
}

message DeleteCustomReportRequest {
  string id = 1;
}

message ListCustomReportsRequest {
  string organization_id = 1;
  string created_by = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListCustomReportsResponse {
  repeated CustomReport reports = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message ExportReportRequest {
  string report_id = 1;
  string format = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message ExportReportResponse {
  bytes data = 1;
  string format = 2;
}

message ScheduleReportRequest {
  string report_id = 1;
  string frequency = 2;
  string recipients = 3;
  string format = 4;
  google.protobuf.Timestamp start_date = 5;
}

message GetScheduledReportsRequest {
  string organization_id = 1;
  bool active_only = 2;
}

message CancelScheduledReportRequest {
  string id = 1;
}

message GetRealTimeMetricsRequest {
  string organization_id = 1;
}

message StreamRealTimeMetricsRequest {
  string organization_id = 1;
  int32 interval_seconds = 2;
}

message GetAnomalyDetectionResultsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  string severity = 4;
}

message GetPredictiveAnalyticsRequest {
  string organization_id = 1;
  string metric = 2;
  google.protobuf.Timestamp forecast_start = 3;
  google.protobuf.Timestamp forecast_end = 4;
}

message GetFunnelAnalysisRequest {
  string organization_id = 1;
  repeated string steps = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message GetCohortAnalysisRequest {
  string organization_id = 1;
  string cohort_type = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message GetBenchmarkComparisonRequest {
  string organization_id = 1;
  string metric = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}
