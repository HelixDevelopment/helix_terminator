syntax = "proto3";

package helixterm.health.v1;

option go_package = "github.com/HelixDevelopment/helix-terminator/proto/helixterm/health/v1;healthv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service HealthService {
  rpc GetHealth(google.protobuf.Empty) returns (HealthStatus);
  rpc GetServiceHealth(GetServiceHealthRequest) returns (ServiceHealth);
  rpc GetAllServicesHealth(google.protobuf.Empty) returns (AllServicesHealth);
  rpc GetDependencyHealth(GetDependencyHealthRequest) returns (DependencyHealth);
  rpc GetSystemMetrics(google.protobuf.Empty) returns (SystemMetrics);
  rpc GetServiceMetrics(GetServiceMetricsRequest) returns (ServiceMetrics);
  rpc StreamHealthStatus(StreamHealthStatusRequest) returns (stream HealthStatus);
  rpc RunHealthCheck(RunHealthCheckRequest) returns (HealthCheckResult);
  rpc GetHealthHistory(GetHealthHistoryRequest) returns (HealthHistory);
  rpc GetHealthConfiguration(google.protobuf.Empty) returns (HealthConfiguration);
  rpc UpdateHealthConfiguration(UpdateHealthConfigurationRequest) returns (HealthConfiguration);
  rpc GetHealthAlerts(GetHealthAlertsRequest) returns (HealthAlerts);
  rpc AcknowledgeHealthAlert(AcknowledgeHealthAlertRequest) returns (HealthAlert);
  rpc GetHealthReport(GetHealthReportRequest) returns (HealthReport);
  rpc GetUptimeReport(GetUptimeReportRequest) returns (UptimeReport);
  rpc GetServiceDependencies(GetServiceDependenciesRequest) returns (ServiceDependencies);
  rpc SimulateFailure(SimulateFailureRequest) returns (SimulationResult);
  rpc GetReadinessStatus(google.protobuf.Empty) returns (ReadinessStatus);
  rpc GetLivenessStatus(google.protobuf.Empty) returns (LivenessStatus);
  rpc GetStartupStatus(google.protobuf.Empty) returns (StartupStatus);
}

message HealthStatus {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
  int64 uptime_seconds = 4;
  map<string, string> details = 5;
}

message ServiceHealth {
  string service = 1;
  string status = 2;
  string version = 3;
  google.protobuf.Timestamp timestamp = 4;
  int64 uptime_seconds = 5;
  repeated HealthCheck checks = 6;
  map<string, string> details = 7;
}

message HealthCheck {
  string name = 1;
  string status = 2;
  string message = 3;
  float latency_ms = 4;
  google.protobuf.Timestamp checked_at = 5;
}

message AllServicesHealth {
  repeated ServiceHealth services = 1;
  int32 healthy_count = 2;
  int32 unhealthy_count = 3;
  int32 degraded_count = 4;
}

message DependencyHealth {
  string dependency = 1;
  string type = 2;
  string status = 3;
  float latency_ms = 4;
  string message = 5;
  google.protobuf.Timestamp checked_at = 6;
}

message SystemMetrics {
  float cpu_percent = 1;
  float memory_percent = 2;
  float disk_percent = 3;
  int64 network_bytes_sent = 4;
  int64 network_bytes_received = 5;
  int32 goroutine_count = 6;
  int32 open_file_descriptors = 7;
  google.protobuf.Timestamp collected_at = 8;
}

message ServiceMetrics {
  string service = 1;
  float request_latency_ms = 2;
  float request_rate = 3;
  float error_rate = 4;
  int32 active_connections = 5;
  int64 total_requests = 6;
  int64 total_errors = 7;
  map<string, float> custom_metrics = 8;
  google.protobuf.Timestamp collected_at = 9;
}

message HealthCheckResult {
  string service = 1;
  string check_name = 2;
  bool passed = 3;
  string message = 4;
  float latency_ms = 5;
  google.protobuf.Timestamp checked_at = 6;
}

message HealthHistory {
  string service = 1;
  repeated HealthHistoryEntry entries = 2;
}

message HealthHistoryEntry {
  string status = 1;
  google.protobuf.Timestamp timestamp = 2;
  string message = 3;
  float latency_ms = 4;
}

message HealthConfiguration {
  int32 check_interval_seconds = 1;
  int32 timeout_seconds = 2;
  int32 failure_threshold = 3;
  int32 success_threshold = 4;
  bool auto_restart = 5;
  repeated string notification_channels = 6;
  map<string, string> custom_settings = 7;
}

message HealthAlert {
  string id = 1;
  string service = 2;
  string severity = 3;
  string message = 4;
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp acknowledged_at = 7;
  string acknowledged_by = 8;
  map<string, string> metadata = 9;
}

message HealthAlerts {
  repeated HealthAlert alerts = 1;
  int32 active_count = 2;
}

message HealthReport {
  string id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  repeated ServiceHealth services = 4;
  map<string, float> uptime_percentages = 5;
  map<string, int32> incident_counts = 6;
  bytes content = 7;
  string format = 8;
}

message UptimeReport {
  string service = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  float uptime_percent = 4;
  int64 total_downtime_seconds = 5;
  int32 incident_count = 6;
  repeated UptimeIncident incidents = 7;
}

message UptimeIncident {
  string id = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp ended_at = 3;
  string duration = 4;
  string severity = 5;
  string description = 6;
}

message ServiceDependencies {
  string service = 1;
  repeated DependencyHealth dependencies = 2;
}

message SimulationResult {
  string simulation_id = 1;
  string type = 2;
  string status = 3;
  string message = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at = 6;
}

message ReadinessStatus {
  bool ready = 1;
  repeated string unready_services = 2;
  string message = 3;
}

message LivenessStatus {
  bool alive = 1;
  string message = 2;
}

message StartupStatus {
  bool started = 1;
  string message = 2;
  int64 startup_duration_ms = 3;
}

message GetServiceHealthRequest {
  string service = 1;
}

message GetDependencyHealthRequest {
  string dependency = 1;
  string type = 2;
}

message GetServiceMetricsRequest {
  string service = 1;
  string metric_type = 2;
}

message StreamHealthStatusRequest {
  int32 interval_seconds = 1;
  repeated string services = 2;
}

message RunHealthCheckRequest {
  string service = 1;
  string check_name = 2;
}

message GetHealthHistoryRequest {
  string service = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message UpdateHealthConfigurationRequest {
  int32 check_interval_seconds = 1;
  int32 timeout_seconds = 2;
  int32 failure_threshold = 3;
  int32 success_threshold = 4;
  bool auto_restart = 5;
  repeated string notification_channels = 6;
  map<string, string> custom_settings = 7;
}

message GetHealthAlertsRequest {
  string service = 1;
  string severity = 2;
  bool active_only = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message AcknowledgeHealthAlertRequest {
  string id = 1;
  string acknowledged_by = 2;
}

message GetHealthReportRequest {
  google.protobuf.Timestamp start_date = 1;
  google.protobuf.Timestamp end_date = 2;
  string format = 3;
}

message GetUptimeReportRequest {
  string service = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetServiceDependenciesRequest {
  string service = 1;
}

message SimulateFailureRequest {
  string service = 1;
  string failure_type = 2;
  int32 duration_seconds = 3;
  string target_dependency = 4;
}
