syntax = "proto3";

package helixterminator.v1;

option go_package = "github.com/HelixDevelopment/helix_terminator/services/auth-service/api/proto;authpb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Authentication service
service AuthService {
  // Register new user
  rpc Register(RegisterRequest) returns (AuthResponse);
  
  // Authenticate user
  rpc Login(LoginRequest) returns (AuthResponse);
  
  // Verify MFA
  rpc VerifyMFA(MFAVerifyRequest) returns (AuthResponse);
  
  // Refresh token
  rpc RefreshToken(RefreshRequest) returns (TokenResponse);
  
  // Revoke session
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  
  // Validate token
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  
  // Setup MFA
  rpc SetupMFA(MFASetupRequest) returns (MFASetupResponse);
  
  // Health check
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  string org_name = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string device_id = 3;
  string device_name = 4;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
  bool mfa_required = 5;
  repeated string mfa_methods = 6;
  string challenge_id = 7;
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string avatar_url = 4;
  string role = 5;
  bool mfa_enabled = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp last_login_at = 8;
}

message MFAVerifyRequest {
  string challenge_id = 1;
  string code = 2;
  string method = 3;
}

message MFASetupRequest {
  string method = 1;
  string device_name = 2;
}

message MFASetupResponse {
  string secret = 1;
  string qr_code = 2;
  repeated string recovery_codes = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message TokenResponse {
  string access_token = 1;
  int64 expires_in = 2;
}

message LogoutRequest {
  string session_id = 1;
  bool all_sessions = 2;
}

message ValidateTokenRequest {
  string token = 1;
  string scope = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string org_id = 3;
  repeated string permissions = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message HealthResponse {
  string status = 1;
  google.protobuf.Timestamp timestamp = 2;
}
