# ============================================
# APPROVAL WORKFLOW
# ============================================
approval_workflow:
  new_dependency:
    - step: "Security review"
      owner: helix-security
      sla: "3 business days"
    - step: "License compliance"
      owner: helix-legal
      sla: "2 business days"
    - step: "Architecture review"
      owner: helix-architecture
      sla: "2 business days"
    - step: "Final approval"
      owner: helix-steward
      sla: "1 business day"

  version_update:
    - step: "Security scan"
      owner: helix-security
      sla: "1 business day"
    - step: "Automated test"
      owner: helix-qa
      sla: "CI pipeline"
    - step: "Approval"
      owner: helix-backend
      sla: "1 business day"
